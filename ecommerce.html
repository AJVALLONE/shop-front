<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Front — Anthony Vallone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#030d1a;--surface:#041626;--card:#061e36;--card-hover:#082440;
      --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.14);
      --cream:#ddeeff;--muted:#4d7a9e;--accent:#38bdf8;--accent-lo:rgba(56,189,248,0.1);
      --red:#c0544a;
      --ff-display:'Cormorant Garamond',Georgia,serif;
      --ff-body:'Outfit',sans-serif;
      --ff-mono:'JetBrains Mono',monospace;
      --cart-width:380px;
    }

    /* ══ LUXURY GLASS SYSTEM ══ */
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse 80% 55% at 18% -5%,  rgba(56,189,248,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 65% 45% at 82% 108%, rgba(99,102,241,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 40% 35% at 55% 55%,  rgba(14,165,233,0.03) 0%, transparent 60%);
      pointer-events:none; z-index:0;
    }
    .grad {
      background:linear-gradient(135deg,#ddeeff 0%,#38bdf8 55%,#818cf8 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    body{position:relative;background:var(--bg);color:var(--cream);font-family:var(--ff-body);font-size:16px;line-height:1.7;font-weight:300;min-height:100vh;overflow-x:hidden;}

    nav{position:sticky;top:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:1.25rem 4rem;background:rgba(3,13,26,0.72);border-bottom:1px solid rgba(56,189,248,0.1);backdrop-filter:blur(26px) saturate(1.8);-webkit-backdrop-filter:blur(26px) saturate(1.8);}
    .nav-left{display:flex;align-items:center;gap:2rem;}
    .nav-logo{font-family:var(--ff-mono);font-size:0.85rem;color:var(--accent);letter-spacing:0.05em;text-decoration:none;}
    .nav-back{font-family:var(--ff-mono);font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
    .nav-back:hover{color:var(--cream);}
    .cart-btn{display:flex;align-items:center;gap:0.6rem;background:none;border:1px solid var(--border);color:var(--cream);font-family:var(--ff-mono);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.5rem 1rem;cursor:pointer;transition:border-color 0.2s;}
    .cart-btn:hover{border-color:rgba(56,189,248,0.45);box-shadow:0 0 14px rgba(56,189,248,0.15);}
    .cart-count{background:var(--accent);color:#030d1a;font-size:0.6rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform 0.25s;}
    .cart-count.bump{transform:scale(1.5);}

    .page-header{padding:3.5rem 4rem 0;}
    .page-tag{font-family:var(--ff-mono);font-size:0.7rem;color:var(--accent);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:0.5rem;}
    .page-title{font-family:var(--ff-display);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:600;line-height:1.0;color:var(--cream);margin-bottom:2.5rem;}
    .page-title em{font-style:italic;color:var(--accent);}

    .filter-bar{display:flex;align-items:center;padding:0 4rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto;background:var(--surface);}
    .filter-group{display:flex;align-items:center;border-right:1px solid var(--border);}
    .filter-label{font-family:var(--ff-mono);font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;padding:1rem 1.25rem;white-space:nowrap;}
    .filter-btn{font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);background:none;border:none;border-right:1px solid var(--border);padding:1rem 1.25rem;cursor:pointer;transition:color 0.2s,background 0.2s;white-space:nowrap;}
    .filter-btn:last-child{border-right:none;}
    .filter-btn:hover{color:var(--cream);background:var(--card);}
    .filter-btn.active{color:var(--accent);background:var(--accent-lo);}
    .sort-select{margin-left:auto;padding:1rem 1.25rem;background:none;border:none;border-left:1px solid var(--border);color:var(--muted);font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;outline:none;white-space:nowrap;}
    .sort-select option{background:var(--surface);}

    .shop-layout{padding:2.5rem 4rem;}
    .results-meta{font-family:var(--ff-mono);font-size:0.68rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:1.5rem;}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);}

    /* PRODUCT CARD — 3D tilt */
    .product-card{
      background:rgba(5,20,44,0.62);
      backdrop-filter:blur(22px) saturate(1.6);
      -webkit-backdrop-filter:blur(22px) saturate(1.6);
      border:1px solid rgba(56,189,248,0.1);
      display:flex;flex-direction:column;
      position:relative;overflow:hidden;
      transform-style:preserve-3d;
      transition:box-shadow 0.3s, background 0.2s, border-color 0.25s;
      will-change:transform;
    }
    .product-card:hover{background:rgba(6,26,54,0.75);border-color:rgba(56,189,248,0.25);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(56,189,248,0.07);}
    .product-image{width:100%;aspect-ratio:3/4;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .product-image-bg{position:absolute;inset:0;transition:transform 0.5s ease;}
    .product-card:hover .product-image-bg{transform:scale(1.06);}
    .product-emoji-wrap{position:relative;z-index:1;font-size:4.5rem;opacity:0.65;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));transition:transform 0.4s ease, opacity 0.3s;}
    .product-card:hover .product-emoji-wrap{transform:translateY(-6px) scale(1.08);opacity:0.8;}
    .product-badge{position:absolute;top:1rem;left:1rem;font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.25rem 0.5rem;background:var(--accent);color:#030d1a;z-index:2;}
    .badge-limited{background:var(--red);color:#fff;}
    .badge-new{background:var(--accent);animation:badgePulse 2.5s ease-in-out infinite;}
    @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,0.4)} 50%{box-shadow:0 0 0 6px rgba(56,189,248,0)}}

    /* Quick view overlay */
    .quick-view-btn{
      position:absolute;bottom:0;left:0;right:0;background:rgba(3,13,26,0.92);
      border-top:1px solid var(--border);color:var(--cream);
      font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;
      padding:0.85rem;border:none;cursor:pointer;z-index:3;
      transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    .product-card:hover .quick-view-btn{transform:translateY(0);}
    .quick-view-btn:hover{color:var(--accent);}

    /* Wishlist */
    .wishlist-btn{position:absolute;top:0.75rem;right:0.75rem;background:rgba(3,13,26,0.7);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;font-size:0.9rem;transition:color 0.2s,background 0.2s,border-color 0.2s;}
    .wishlist-btn:hover{color:var(--red);border-color:rgba(192,84,74,0.4);}
    .wishlist-btn.active{color:var(--red);background:rgba(192,84,74,0.1);border-color:rgba(192,84,74,0.4);}

    .product-info{padding:1.25rem;display:flex;flex-direction:column;flex:1;}
    .product-cat{font-family:var(--ff-mono);font-size:0.62rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.35rem;}
    .product-name{font-family:var(--ff-display);font-size:1.4rem;font-weight:600;color:var(--cream);line-height:1.15;margin-bottom:0.5rem;}
    .product-desc{font-size:0.8rem;color:rgba(240,233,218,0.5);margin-bottom:1rem;flex:1;line-height:1.5;}
    .product-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
    .product-price{font-family:var(--ff-display);font-size:1.5rem;font-weight:600;color:var(--cream);}
    .add-to-cart-btn{padding:0.55rem 1rem;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--ff-mono);font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
    .add-to-cart-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lo);}
    .add-to-cart-btn.added{border-color:var(--accent);color:var(--accent);background:var(--accent-lo);}

    /* Staggered entrance */
    .product-card{opacity:0;transform:translateY(20px);}
    .product-card.entered{opacity:1;transform:translateY(0);transition:opacity 0.45s ease,transform 0.45s ease,box-shadow 0.3s,background 0.2s;}

    /* FLY TO CART */
    .fly-item{
      position:fixed;z-index:9999;font-size:1.8rem;pointer-events:none;
      animation:flyToCart var(--dur,0.7s) cubic-bezier(0.4,0,0.6,1) forwards;
    }
    @keyframes flyToCart{0%{transform:translate(0,0) scale(1);opacity:1} 80%{opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0.1);opacity:0}}

    /* QUICK VIEW MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s;display:flex;align-items:center;justify-content:center;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:rgba(3,12,28,0.90);backdrop-filter:blur(30px) saturate(1.9);-webkit-backdrop-filter:blur(30px) saturate(1.9);border:1px solid rgba(56,189,248,0.16);max-width:540px;width:90%;padding:2.5rem;position:relative;transform:translateY(20px);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 60px rgba(56,189,248,0.06);}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:color 0.2s,border-color 0.2s;}
    .modal-close:hover{color:var(--cream);border-color:var(--border-hi);}
    .modal-emoji{font-size:5rem;text-align:center;margin-bottom:1.5rem;display:block;opacity:0.7;}
    .modal-cat{font-family:var(--ff-mono);font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.4rem;}
    .modal-name{font-family:var(--ff-display);font-size:2.5rem;font-weight:600;color:var(--cream);line-height:1.1;margin-bottom:0.75rem;}
    .modal-desc{font-size:0.95rem;color:rgba(240,233,218,0.65);margin-bottom:1.5rem;line-height:1.7;}
    .modal-price{font-family:var(--ff-display);font-size:2rem;font-weight:600;color:var(--accent);margin-bottom:1.5rem;}
    .modal-add-btn{width:100%;padding:1rem;background:var(--accent);color:#030d1a;font-family:var(--ff-mono);font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity 0.2s;}
    .modal-add-btn:hover{opacity:0.85;}

    /* CART */
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .cart-overlay.open{opacity:1;pointer-events:all;}
    .cart-drawer{position:fixed;top:0;right:0;width:var(--cart-width);max-width:95vw;height:100vh;background:rgba(3,12,28,0.92);backdrop-filter:blur(32px) saturate(1.8);-webkit-backdrop-filter:blur(32px) saturate(1.8);border-left:1px solid rgba(56,189,248,0.14);z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);}
    .cart-drawer.open{transform:translateX(0);}
    .cart-header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem;border-bottom:1px solid var(--border);}
    .cart-header-title{font-family:var(--ff-display);font-size:1.75rem;font-weight:600;color:var(--cream);}
    .cart-header-title em{font-style:italic;color:var(--accent);}
    .cart-close{background:none;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:color 0.2s,border-color 0.2s;}
    .cart-close:hover{color:var(--cream);border-color:var(--border-hi);}
    .cart-items{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
    .cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.75rem;}
    .cart-empty p{font-family:var(--ff-mono);font-size:0.75rem;color:var(--muted);letter-spacing:0.1em;}
    .cart-item{display:grid;grid-template-columns:auto 1fr auto;gap:1rem;align-items:start;padding:1rem 0;border-bottom:1px solid var(--border);animation:cartItemIn 0.25s ease forwards;}
    @keyframes cartItemIn{from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)}}
    .cart-item:last-child{border-bottom:none;}
    .cart-item-emoji{font-size:2rem;width:52px;height:52px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
    .cart-item-name{font-family:var(--ff-display);font-size:1.1rem;font-weight:600;color:var(--cream);margin-bottom:0.2rem;}
    .cart-item-price{font-family:var(--ff-mono);font-size:0.75rem;color:var(--accent);}
    .cart-item-qty{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;}
    .qty-btn{width:26px;height:26px;background:var(--card);border:1px solid var(--border);color:var(--cream);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s;}
    .qty-btn:hover{border-color:var(--border-hi);}
    .qty-num{font-family:var(--ff-mono);font-size:0.78rem;color:var(--cream);min-width:1.2rem;text-align:center;}
    .cart-item-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0.2rem;transition:color 0.2s;}
    .cart-item-remove:hover{color:var(--red);}
    .cart-footer{border-top:1px solid var(--border);padding:1.5rem;}
    .cart-subtotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;}
    .cart-subtotal-label{font-family:var(--ff-mono);font-size:0.68rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
    .cart-subtotal-value{font-family:var(--ff-display);font-size:1.75rem;font-weight:600;color:var(--cream);}
    .cart-note{font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;}
    .checkout-btn{width:100%;padding:1rem;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#030d1a;font-family:var(--ff-mono);font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;border:none;cursor:pointer;box-shadow:0 0 24px rgba(56,189,248,0.3);transition:opacity 0.2s,box-shadow 0.2s;}
    .checkout-btn:hover{opacity:0.85;}
    .checkout-btn:disabled{opacity:0.4;cursor:not-allowed;}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid rgba(56,189,248,0.3);color:var(--cream);font-family:var(--ff-mono);font-size:0.72rem;letter-spacing:0.08em;padding:0.75rem 1.5rem;z-index:500;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:768px){
      nav,body{cursor:auto;}
      nav{padding:1rem 1.5rem;}
      .page-header{padding:2.5rem 1.5rem 0;}
      .filter-bar{padding:0 1.5rem;}
      .shop-layout{padding:2rem 1.5rem;}
      :root{--cart-width:100vw;}
    }
  </style>
</head>
<body>
  <!-- CART -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2 class="cart-header-title">Your<br /><em>Cart.</em></h2>
      <button class="cart-close" id="cart-close">×</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty" id="cart-empty">
        <p>// your cart is empty</p>
        <p style="color:rgba(122,116,105,0.4);font-size:0.65rem;">Add something beautiful</p>
      </div>
    </div>
    <div class="cart-footer">
      <div class="cart-subtotal"><span class="cart-subtotal-label">Subtotal</span><span class="cart-subtotal-value" id="cart-total">$0</span></div>
      <p class="cart-note">Shipping & taxes at checkout</p>
      <button class="checkout-btn" id="checkout-btn" disabled>Proceed to Checkout</button>
    </div>
  </div>

  <!-- QUICK VIEW MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">×</button>
      <span class="modal-emoji" id="modal-emoji"></span>
      <p class="modal-cat" id="modal-cat"></p>
      <h2 class="modal-name" id="modal-name"></h2>
      <p class="modal-desc" id="modal-desc"></p>
      <p class="modal-price" id="modal-price"></p>
      <button class="modal-add-btn" id="modal-add-btn">Add to Cart</button>
    </div>
  </div>

  <nav>
    <div class="nav-left">
      <a class="nav-logo" href="https://anthonyvallone.netlify.app/">AV.dev</a>
      <a class="nav-back" href="https://anthonyvallone.netlify.app/">← Portfolio</a>
    </div>
    <button class="cart-btn" id="cart-toggle">
      Cart <span class="cart-count" id="cart-count">0</span>
    </button>
  </nav>

  <div class="page-header">
    <p class="page-tag">Project 03</p>
    <h1 class="page-title grad">Shop<br /><em>Front.</em></h1>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Category</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="tees">Tees</button>
      <button class="filter-btn" data-filter="hoodies">Hoodies</button>
      <button class="filter-btn" data-filter="accessories">Accessories</button>
      <button class="filter-btn" data-filter="outerwear">Outerwear</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="default">Sort: Featured</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="name-asc">Name: A → Z</option>
    </select>
  </div>

  <div class="shop-layout">
    <p class="results-meta" id="results-meta">Showing 8 items</p>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const PRODUCTS = [
      {id:1, name:'Essential Tee',    category:'tees',        price:38,  desc:'Clean heavyweight cotton with a relaxed oversized cut. The foundation of every wardrobe.',                                         emoji:'👕', badge:null,       gradA:'#1a1208', gradB:'#2a1e0f'},
      {id:2, name:'Archive Hoodie',   category:'hoodies',     price:98,  desc:'Midweight French terry with a brushed interior. Structured fit, dropped shoulders.',                                              emoji:'🧥', badge:'Best Seller', gradA:'#111116', gradB:'#1a1a22'},
      {id:3, name:'Structured Cap',   category:'accessories', price:45,  desc:'Six-panel structured fit with an embossed logo and adjustable strapback.',                                                        emoji:'🧢', badge:null,         gradA:'#030d1a', gradB:'#181410'},
      {id:4, name:'Luxe Graphic Tee', category:'tees',        price:55,  desc:'Premium 240gsm cotton with a hand-feel screen print. Garment dyed in small batches.',                                            emoji:'👕', badge:'New',         gradA:'#1a1208', gradB:'#251a08'},
      {id:5, name:'Coach Jacket',     category:'outerwear',   price:145, desc:'Nylon shell with contrast stitching and embroidered chest logo. Water-resistant finish.',                                         emoji:'🥋', badge:null,          gradA:'#030d1a', gradB:'#161510'},
      {id:6, name:'Utility Tote',     category:'accessories', price:68,  desc:'Canvas with reinforced handles, interior pockets, and heat-stamped hardware.',                                                   emoji:'🎒', badge:null,           gradA:'#141208', gradB:'#1e1a10'},
      {id:7, name:'Quarter Zip',      category:'hoodies',     price:115, desc:'Merino-blend quarter zip with a clean silhouette. Boardroom to weekend.',                                                        emoji:'👔', badge:'New',          gradA:'#100e14', gradB:'#1a1820'},
      {id:8, name:'Field Jacket',     category:'outerwear',   price:195, desc:'Wax canvas exterior with sherpa-lined body. Built to age beautifully.',                                                          emoji:'🥼', badge:'Limited',      gradA:'#1a1208', gradB:'#100c04'},
    ];

    let cart = [], activeFilter = 'all', activeSort = 'default';
    let wishlisted = new Set();
    let quickViewId = null;

    function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    function formatPrice(n) { return `$${n.toFixed(0)}`; }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── 3D TILT ──────────────────────────────────────────────────
    function initTilt(card) {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width  / 2;
        const cy = rect.top  + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width  / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);
        card.style.transform = `perspective(900px) rotateX(${-dy * 6}deg) rotateY(${dx * 6}deg) translateZ(8px)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    }

    // ── FLY TO CART ──────────────────────────────────────────────
    function flyToCart(startX, startY, emoji) {
      const cartBtn = document.getElementById('cart-toggle');
      const cartRect = cartBtn.getBoundingClientRect();
      const tx = cartRect.left + cartRect.width  / 2 - startX;
      const ty = cartRect.top  + cartRect.height / 2 - startY;
      const el = document.createElement('div');
      el.className = 'fly-item';
      el.style.cssText = `left:${startX}px;top:${startY}px;--tx:${tx}px;--ty:${ty}px;`;
      el.textContent = emoji;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 750);
    }

    // ── FILTER & SORT ─────────────────────────────────────────────
    function getVisible() {
      let list = activeFilter === 'all' ? [...PRODUCTS] : PRODUCTS.filter(p => p.category === activeFilter);
      if (activeSort === 'price-asc')  list.sort((a,b) => a.price - b.price);
      if (activeSort === 'price-desc') list.sort((a,b) => b.price - a.price);
      if (activeSort === 'name-asc')   list.sort((a,b) => a.name.localeCompare(b.name));
      return list;
    }

    // ── RENDER PRODUCTS ───────────────────────────────────────────
    function renderProducts() {
      const grid = document.getElementById('products-grid');
      const meta = document.getElementById('results-meta');
      const products = getVisible();
      grid.innerHTML = '';
      meta.textContent = `Showing ${products.length} item${products.length !== 1 ? 's' : ''}`;

      products.forEach((p, i) => {
        const inCart = cart.find(c => c.id === p.id);
        const wished = wishlisted.has(p.id);
        const card = document.createElement('div');
        card.className = 'product-card';
        card.dataset.id = p.id;

        let badgeHtml = '';
        if (p.badge) {
          const cls = p.badge === 'Limited' ? 'badge-limited' : p.badge === 'New' ? 'badge-new' : '';
          badgeHtml = `<span class="product-badge ${cls}">${escHtml(p.badge)}</span>`;
        }

        card.innerHTML = `
          <div class="product-image">
            <div class="product-image-bg" style="position:absolute;inset:0;background:linear-gradient(135deg,${p.gradA},${p.gradB})"></div>
            ${badgeHtml}
            <button class="wishlist-btn ${wished ? 'active' : ''}" data-id="${p.id}" title="Wishlist">♥</button>
            <div class="product-emoji-wrap">${p.emoji}</div>
            <button class="quick-view-btn" data-id="${p.id}">Quick View</button>
          </div>
          <div class="product-info">
            <p class="product-cat">${escHtml(p.category)}</p>
            <h3 class="product-name">${escHtml(p.name)}</h3>
            <p class="product-desc">${escHtml(p.desc)}</p>
            <div class="product-footer">
              <span class="product-price">${formatPrice(p.price)}</span>
              <button class="add-to-cart-btn ${inCart ? 'added' : ''}" data-id="${p.id}">${inCart ? '✓ Added' : '+ Cart'}</button>
            </div>
          </div>`;

        card.querySelector('.add-to-cart-btn').addEventListener('click', e => {
          const btn = e.currentTarget;
          const rect = btn.getBoundingClientRect();
          addToCart(parseInt(btn.dataset.id), rect.left + rect.width/2, rect.top + rect.height/2);
        });
        card.querySelector('.quick-view-btn').addEventListener('click', e => { e.stopPropagation(); openQuickView(parseInt(e.currentTarget.dataset.id)); });
        card.querySelector('.wishlist-btn').addEventListener('click', e => { e.stopPropagation(); toggleWishlist(parseInt(e.currentTarget.dataset.id)); });

        grid.appendChild(card);
        initTilt(card);

        // Staggered entrance
        requestAnimationFrame(() => {
          setTimeout(() => card.classList.add('entered'), i * 60);
        });
      });
    }

    // ── WISHLIST ──────────────────────────────────────────────────
    function toggleWishlist(id) {
      const p = PRODUCTS.find(x => x.id === id);
      if (wishlisted.has(id)) { wishlisted.delete(id); showToast(`${p.name} removed from wishlist`); }
      else { wishlisted.add(id); showToast(`♥ ${p.name} added to wishlist`); }
      renderProducts();
    }

    // ── QUICK VIEW ────────────────────────────────────────────────
    function openQuickView(id) {
      const p = PRODUCTS.find(x => x.id === id);
      if (!p) return;
      quickViewId = id;
      document.getElementById('modal-emoji').textContent = p.emoji;
      document.getElementById('modal-cat').textContent   = p.category;
      document.getElementById('modal-name').textContent  = p.name;
      document.getElementById('modal-desc').textContent  = p.desc;
      document.getElementById('modal-price').textContent = formatPrice(p.price);
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeQuickView() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
      quickViewId = null;
    }
    document.getElementById('modal-close').addEventListener('click', closeQuickView);
    document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeQuickView(); });
    document.getElementById('modal-add-btn').addEventListener('click', () => {
      if (quickViewId) {
        const modal = document.getElementById('modal');
        const rect = modal.getBoundingClientRect();
        addToCart(quickViewId, rect.left + rect.width/2, rect.top + 80);
        closeQuickView();
      }
    });

    // ── CART ──────────────────────────────────────────────────────
    function addToCart(id, sx, sy) {
      const p = PRODUCTS.find(x => x.id === id); if (!p) return;
      const existing = cart.find(c => c.id === id);
      if (existing) existing.qty++;
      else cart.push({id, qty:1});
      flyToCart(sx, sy, p.emoji);
      updateCartUI(); renderProducts();
      const countEl = document.getElementById('cart-count');
      countEl.classList.add('bump'); setTimeout(() => countEl.classList.remove('bump'), 300);
      showToast(`${p.name} added to cart`);
    }

    function removeFromCart(id) { cart = cart.filter(c => c.id !== id); updateCartUI(); renderProducts(); }
    function updateQty(id, delta) {
      const item = cart.find(c => c.id === id); if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) removeFromCart(id);
      else { updateCartUI(); renderProducts(); }
    }

    function getTotal() { return cart.reduce((s,i) => { const p=PRODUCTS.find(x=>x.id===i.id); return s+(p?p.price*i.qty:0); },0); }
    function getCount() { return cart.reduce((s,i) => s+i.qty, 0); }

    function updateCartUI() {
      document.getElementById('cart-count').textContent = getCount();
      document.getElementById('cart-total').textContent = formatPrice(getTotal());
      document.getElementById('checkout-btn').disabled = getCount() === 0;
      const container = document.getElementById('cart-items');
      const empty = document.getElementById('cart-empty');
      container.querySelectorAll('.cart-item').forEach(el => el.remove());
      if (cart.length === 0) { empty.style.display='flex'; return; }
      empty.style.display = 'none';
      cart.forEach(item => {
        const p = PRODUCTS.find(x => x.id === item.id); if (!p) return;
        const row = document.createElement('div'); row.className = 'cart-item';
        row.innerHTML = `
          <div class="cart-item-emoji">${p.emoji}</div>
          <div>
            <p class="cart-item-name">${escHtml(p.name)}</p>
            <p class="cart-item-price">${formatPrice(p.price)} each</p>
            <div class="cart-item-qty">
              <button class="qty-btn" data-id="${p.id}" data-delta="-1">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" data-id="${p.id}" data-delta="1">+</button>
            </div>
          </div>
          <button class="cart-item-remove" data-id="${p.id}">×</button>`;
        row.querySelectorAll('.qty-btn').forEach(btn => btn.addEventListener('click', () => updateQty(parseInt(btn.dataset.id), parseInt(btn.dataset.delta))));
        row.querySelector('.cart-item-remove').addEventListener('click', e => removeFromCart(parseInt(e.currentTarget.dataset.id)));
        container.appendChild(row);
      });
    }

    function openCart()  { document.getElementById('cart-drawer').classList.add('open'); document.getElementById('cart-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
    function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); document.getElementById('cart-overlay').classList.remove('open'); document.body.style.overflow=''; }
    document.getElementById('cart-toggle').addEventListener('click', openCart);
    document.getElementById('cart-close').addEventListener('click', closeCart);
    document.getElementById('cart-overlay').addEventListener('click', closeCart);
    document.getElementById('checkout-btn').addEventListener('click', () => {
      showToast(`Order placed — ${formatPrice(getTotal())} · ${getCount()} items`);
      cart = []; updateCartUI(); closeCart(); renderProducts();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); activeFilter = btn.dataset.filter; renderProducts();
      });
    });
    document.getElementById('sort-select').addEventListener('change', e => { activeSort = e.target.value; renderProducts(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') { closeCart(); closeQuickView(); } });

    renderProducts(); updateCartUI();
  </script>
</body>
</html>
